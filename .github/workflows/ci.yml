name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check shared schemas
        run: cd packages/shared && npx tsc --noEmit

      - name: Lint
        run: cd apps/frontend && npm run lint

      - name: Spell check
        run: cd apps/frontend && npm run spell

      - name: Build
        run: cd apps/frontend && npm run build

      - name: Test
        run: cd apps/frontend && npm run test:run

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to Amplify
        run: |
          APP_ID="d35kx8fgop2qtf"
          BRANCH="main"

          cd apps/frontend/dist && zip -r /tmp/deploy.zip . && cd -

          RESULT=$(aws amplify create-deployment --app-id "$APP_ID" --branch-name "$BRANCH" --output json)
          JOB_ID=$(echo "$RESULT" | jq -r '.jobId')
          UPLOAD_URL=$(echo "$RESULT" | jq -r '.zipUploadUrl')

          curl --fail --silent -T /tmp/deploy.zip "$UPLOAD_URL"

          aws amplify start-deployment --app-id "$APP_ID" --branch-name "$BRANCH" --job-id "$JOB_ID"

          echo "Waiting for deployment to complete..."
          for i in $(seq 1 20); do
            STATUS=$(aws amplify get-job --app-id "$APP_ID" --branch-name "$BRANCH" \
              --job-id "$JOB_ID" --query 'job.summary.status' --output text)
            echo "  Attempt $i: status=[$STATUS]"
            case "$STATUS" in
              SUCCEED)
                echo "Deployment $JOB_ID succeeded!"
                exit 0
                ;;
              FAILED|CANCELLED)
                echo "Deployment $JOB_ID failed with status: $STATUS"
                exit 1
                ;;
            esac
            sleep 5
          done
          echo "Timeout waiting for deployment $JOB_ID"
          exit 1

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check shared schemas
        run: cd packages/shared && npx tsc --noEmit

      - name: Lint
        run: cd apps/backend && npx eslint 'src/**/*.ts'

      - name: Type-check
        run: cd apps/backend && npx tsc --noEmit

      - name: Test
        run: cd apps/backend && npx jest --no-coverage

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to AWS
        run: cd apps/backend && npx serverless deploy --stage prod --conceal

  e2e:
    name: E2E Tests
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright
        run: cd tests/e2e && npx playwright install --with-deps chromium
      - name: Run E2E tests
        env:
          API_URL: https://api.baita.help
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: cd tests/e2e && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
