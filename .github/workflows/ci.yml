name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  shared:
    name: Shared Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Type-check shared schemas
        run: cd packages/shared && npx tsc --noEmit

  frontend-quality:
    name: Frontend Quality
    needs: shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Lint
        run: cd apps/frontend && npm run lint
      - name: Spell Check
        run: cd apps/frontend && npm run spell
      - name: Build + Type Check
        run: cd apps/frontend && npm run build
      - name: Test
        run: cd apps/frontend && npm run test:run

  frontend-deploy:
    name: Frontend Deploy
    needs: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Trigger Amplify Build
        run: |
          aws amplify start-job \
            --app-id d35kx8fgop2qtf \
            --branch-name main \
            --job-type RELEASE

  backend-quality:
    name: Backend Quality
    needs: shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Lint
        run: cd apps/backend && npx eslint 'src/**/*.ts'
      - name: Type Check
        run: cd apps/backend && npx tsc --noEmit
      - name: Test
        run: cd apps/backend && npx jest --no-coverage

  backend-deploy:
    name: Backend Deploy
    needs: backend-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Deploy
        run: cd apps/backend && npx serverless deploy --stage prod --verbose

  e2e:
    name: E2E Tests
    needs: [frontend-deploy, backend-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Install Playwright
        run: cd tests/e2e && npx playwright install --with-deps chromium
      - name: Run E2E Tests
        env:
          TEST_ENV: local
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: cd tests/e2e && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
