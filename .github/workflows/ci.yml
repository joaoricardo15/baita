name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Quality Gate ───────────────────────────────────────────────────────
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Spell check frontend
        run: cd apps/frontend && npm run spell
      - name: Lint, type-check, and test (parallel)
        run: pnpm turbo run lint type-check test:run

  # ─── Deploy Frontend ───────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_MAP_ID: ${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}
        run: cd apps/frontend && npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to Amplify
        run: |
          aws cloudformation deploy \
            --stack-name baita-frontend-prod \
            --template-file apps/frontend/cloudformation.yml \
            --parameter-overrides Stage=prod \
            --no-fail-on-empty-changeset

          APP_ID=$(aws cloudformation describe-stacks \
            --stack-name baita-frontend-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`AmplifyAppId`].OutputValue' \
            --output text)

          cd apps/frontend/dist && zip -qr /tmp/deploy.zip .

          DEPLOY=$(aws amplify create-deployment --app-id "$APP_ID" --branch-name main --output json)
          curl --fail -s -T /tmp/deploy.zip "$(echo $DEPLOY | jq -r '.zipUploadUrl')"
          JOB=$(echo $DEPLOY | jq -r '.jobId')
          aws amplify start-deployment --app-id "$APP_ID" --branch-name main --job-id "$JOB"

          while true; do
            STATUS=$(aws amplify get-job --app-id "$APP_ID" --branch-name main --job-id "$JOB" \
              --query 'job.summary.status' --output text)
            case $STATUS in
              SUCCEED) exit 0 ;;
              FAILED|CANCELLED) exit 1 ;;
            esac
            sleep 3
          done

  # ─── Deploy Backend ────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to AWS
        run: cd apps/backend && npx serverless deploy --stage prod --conceal

      - name: Generate and deploy OpenAPI docs
        run: cd apps/backend && npm run docs

  # ─── Deploy Auth0 ──────────────────────────────────────────────────────
  deploy-auth0:
    name: Deploy Auth0
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install auth0-deploy-cli
        run: npm install -g auth0-deploy-cli
      - name: Deploy configuration
        env:
          AUTH0_DOMAIN: dev-yc4pbydg.us.auth0.com
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_DEPLOY_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_DEPLOY_CLIENT_SECRET }}
        run: cd infra/auth0 && a0deploy import --input_file=tenant.yaml

  # ─── E2E Tests ─────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    needs: [deploy-frontend, deploy-backend, deploy-auth0]
    runs-on: ubuntu-latest
    env:
      API_URL: https://api.baita.help
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright
        run: cd tests/e2e && npx playwright install --with-deps chromium
      - name: Setup E2E test user
        run: cd tests/e2e && npm run e2e:setup
      - name: Run E2E journey tests
        run: cd tests/e2e && npm run e2e:test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
      - name: Cleanup E2E test user
        if: always()
        run: cd tests/e2e && npm run e2e:cleanup
