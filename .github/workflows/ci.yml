name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check shared schemas
        run: cd packages/shared && npx tsc --noEmit

      - name: Lint
        run: cd apps/frontend && npm run lint

      - name: Spell check
        run: cd apps/frontend && npm run spell

      - name: Build
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_MAP_ID: ${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}
        run: cd apps/frontend && npm run build

      - name: Test
        run: cd apps/frontend && npm test

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy infrastructure
        id: infra
        run: |
          aws cloudformation deploy \
            --stack-name baita-frontend-prod \
            --template-file apps/frontend/cloudformation.yml \
            --parameter-overrides Stage=prod \
            --no-fail-on-empty-changeset
          APP_ID=$(aws cloudformation describe-stacks \
            --stack-name baita-frontend-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`AmplifyAppId`].OutputValue' \
            --output text)
          echo "app-id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Package build artifact
        run: cd apps/frontend/dist && zip -qr /tmp/deploy.zip .

      - name: Upload and deploy to Amplify
        id: deploy
        run: |
          DEPLOY=$(aws amplify create-deployment \
            --app-id ${{ steps.infra.outputs.app-id }} --branch-name main --output json)
          curl --fail -s -T /tmp/deploy.zip \
            "$(echo $DEPLOY | jq -r '.zipUploadUrl')"
          JOB=$(echo $DEPLOY | jq -r '.jobId')
          aws amplify start-deployment \
            --app-id ${{ steps.infra.outputs.app-id }} --branch-name main --job-id "$JOB"
          echo "job-id=$JOB" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        timeout-minutes: 2
        run: |
          while true; do
            STATUS=$(aws amplify get-job --app-id ${{ steps.infra.outputs.app-id }} \
              --branch-name main --job-id ${{ steps.deploy.outputs.job-id }} \
              --query 'job.summary.status' --output text)
            case $STATUS in
              SUCCEED) exit 0 ;;
              FAILED|CANCELLED) exit 1 ;;
            esac
            sleep 3
          done

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check shared schemas
        run: cd packages/shared && npx tsc --noEmit

      - name: Lint
        run: cd apps/backend && npx eslint 'src/**/*.ts'

      - name: Type-check
        run: cd apps/backend && npx tsc --noEmit

      - name: Test
        run: cd apps/backend && npx jest --no-coverage

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to AWS
        run: cd apps/backend && npx serverless deploy --stage prod --conceal

      - name: Generate and deploy OpenAPI docs
        run: cd apps/backend && npm run docs

  e2e:
    name: E2E Tests
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    env:
      API_URL: https://api.baita.help
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright
        run: cd tests/e2e && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd tests/e2e && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
      - name: Cleanup E2E test user
        if: always()
        run: cd tests/e2e && npx playwright test user-teardown --project=teardown || true
