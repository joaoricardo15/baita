name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-frontend.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Lint
        run: cd apps/frontend && npm run lint
      - name: Spell Check
        run: cd apps/frontend && npm run spell
      - name: Type Check + Build
        run: cd apps/frontend && npm run build
      - name: Test
        run: cd apps/frontend && npm run test:run
