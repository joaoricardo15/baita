name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-frontend.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Lint
        run: cd apps/frontend && npm run lint
      - name: Spell Check
        run: cd apps/frontend && npm run spell
      - name: Type Check + Build
        run: cd apps/frontend && npm run build
      - name: Test
        run: cd apps/frontend && npm run test:run

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Trigger Amplify Build
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id d35kx8fgop2qtf \
            --branch-name master \
            --job-type RELEASE \
            --query 'jobSummary.jobId' --output text)
          echo "Amplify job started: $JOB_ID"
      - name: Wait for Amplify Deploy
        run: |
          for i in $(seq 1 40); do
            STATUS=$(aws amplify list-jobs --app-id d35kx8fgop2qtf --branch-name master \
              --query 'jobSummaries[0].status' --output text)
            echo "Status: $STATUS (attempt $i/40)"
            if [ "$STATUS" = "SUCCEED" ]; then exit 0; fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then exit 1; fi
            sleep 15
          done
          echo "Timeout waiting for Amplify deploy" && exit 1
