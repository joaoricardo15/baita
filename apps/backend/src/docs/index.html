<!DOCTYPE html>
<html>
  <head>
    <title>Baita Help — API Documentation</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css" />
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js"></script>
    <script>
      const hash = window.location.hash.substring(1)
      const params = new URLSearchParams(hash)
      let token = params.get("access_token")
      if (token) {
        sessionStorage.setItem("swagger_token", token)
        window.history.replaceState(null, "", window.location.pathname)
      } else {
        token = sessionStorage.getItem("swagger_token")
      }

      const ui = SwaggerUIBundle({
        url: "https://baita-help-prod-docs.s3.us-east-1.amazonaws.com/openapi.json",
        dom_id: "#swagger-ui",
        persistAuthorization: true,
        requestInterceptor: function(req) {
          if (token) req.headers["Authorization"] = "Bearer " + token
          return req
        },
        onComplete: function() {
          if (token) ui.preauthorizeApiKey("bearerAuth", token)
        }
      })
    </script>
  </body>
</html>
