<!doctype html>
<html>
  <head>
    <title>Baita - API Documentation</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css"
    />
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js"></script>
    <script>
      const ui = SwaggerUIBundle({
        url: 'https://baita-backend-prod-docs.s3.us-east-1.amazonaws.com/openapi.json',
        dom_id: '#swagger-ui',
        persistAuthorization: true,
        oauth2RedirectUrl:
          'https://api.baita.help/oauth2-redirect.html',
      })

      ui.initOAuth({
        clientId: 'Pq5VTtkIhUSfe9bqkoPsLvGCw1JBNf4c',
        usePkceWithAuthorizationCodeGrant: true,
        scopes: 'openid',
        additionalQueryStringParams: {
          audience: 'https://dev-yc4pbydg.us.auth0.com/api/v2/',
        },
      })
    </script>
  </body>
</html>
