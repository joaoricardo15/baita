service: baita-help

plugins:
  - serverless-offline
  - serverless-esbuild
  - serverless-domain-manager
  - serverless-deployment-bucket

package:
  individually: true

build:
  esbuild: false

custom:
  serverless-offline:
    useChildProcesses: true
  customDomain:
    domainName: api.baita.help
    stage: prod
  # Shared HTTP event defaults (referenced via ${self:custom.cors} and ${self:custom.authorizer})
  cors:
    origins:
      - ${self:provider.environment.SERVICE_SITE_URL}
      - ${self:provider.environment.SERVICE_LOCAL_URL}
    headers:
      - Content-Type
      - Authorization
      - Accept
    allowCredentials: true
  authorizer:
    name: authorizer
    resultTtlInSeconds: 300
    identitySource: method.request.header.Authorization
    type: token

provider:
  name: aws
  timeout: 30
  region: us-east-1
  memorySize: 512
  runtime: nodejs20.x
  versionFunctions: false
  stage: ${opt:stage, 'dev'}
  apiName: ${self:provider.environment.SERVICE_PREFIX}
  logRetentionInDays: 14
  deploymentBucket:
    name: ${self:provider.environment.SERVICE_PREFIX}
    blockPublicAccess: true
  iamRoleStatements:
    - Effect: Allow
      Action:
        [
          dynamodb:PutItem,
          dynamodb:GetItem,
          dynamodb:UpdateItem,
          dynamodb:DeleteItem,
          dynamodb:BatchWriteItem,
          dynamodb:Query,
          dynamodb:Scan,
        ]
      Resource:
        - arn:aws:dynamodb:us-east-1:*:table/${self:provider.environment.CORE_TABLE}
        - arn:aws:dynamodb:us-east-1:*:table/${self:provider.environment.CORE_TABLE}/index/*
    - Effect: Allow
      Action: [s3:PutObject, s3:GetObject, s3:DeleteObject]
      Resource:
        - arn:aws:s3:::${self:provider.environment.BOTS_BUCKET}/*
        - arn:aws:s3:::${self:provider.environment.FILES_BUCKET}/*
    - Effect: Allow
      Action:
        [
          sqs:CreateQueue,
          sqs:GetQueueUrl,
          sqs:SendMessage,
          sqs:SendMessageBatch,
          sqs:ReceiveMessage,
          sqs:DeleteMessage,
          sqs:DeleteMessageBatch,
          sqs:GetQueueAttributes,
          sqs:SetQueueAttributes,
          sqs:DeleteQueue,
          sqs:TagQueue,
        ]
      Resource:
        - arn:aws:sqs:us-east-1:*:${self:provider.environment.SERVICE_PREFIX}-*
    - Effect: Allow
      Action:
        [
          lambda:CreateFunction,
          lambda:UpdateFunctionCode,
          lambda:DeleteFunction,
          lambda:InvokeFunction,
          lambda:TagResource,
        ]
      Resource:
        - arn:aws:lambda:us-east-1:*:function:${self:provider.environment.SERVICE_PREFIX}-*
    - Effect: Allow
      Action:
        [
          logs:CreateLogGroup,
          logs:DeleteLogGroup,
          logs:StartQuery,
          logs:GetQueryResults,
        ]
      Resource:
        - arn:aws:logs:us-east-1:*:log-group:/aws/lambda/${self:provider.environment.SERVICE_PREFIX}-*:*
    - Effect: Allow
      Action:
        [
          scheduler:CreateSchedule,
          scheduler:UpdateSchedule,
          scheduler:DeleteSchedule,
          scheduler:CreateScheduleGroup,
          scheduler:DeleteScheduleGroup,
          scheduler:TagResource,
        ]
      Resource:
        - arn:aws:scheduler:us-east-1:*:schedule/default/${self:provider.environment.SERVICE_PREFIX}-*
        - arn:aws:scheduler:us-east-1:*:schedule/${self:provider.environment.SERVICE_PREFIX}-*/*
        - arn:aws:scheduler:us-east-1:*:schedule-group/${self:provider.environment.SERVICE_PREFIX}-*
    - Effect: Allow
      Action:
        [
          apigateway:POST,
          apigateway:DELETE,
          apigateway:GET,
          apigateway:TagResource,
        ]
      Resource:
        - arn:aws:apigateway:us-east-1::/apis
        - arn:aws:apigateway:us-east-1::/apis/*
        - arn:aws:apigateway:us-east-1::/tags/*
    - Effect: Allow
      Action: [iam:PassRole]
      Resource:
        - ${self:provider.environment.BOTS_PERMISSION}
    - Effect: Allow
      Action: [ssm:GetParameter, ssm:GetParameters]
      Resource: arn:aws:ssm:us-east-1:*:parameter/baita/prod/*
    - Effect: Allow
      Action: [tag:GetResources]
      Resource: '*'
  environment:
    SERVICE_PREFIX: ${self:service}-prod
    SERVICE_API_URL: https://api.baita.help
    SERVICE_SITE_URL: https://www.baita.help
    SERVICE_LOCAL_URL: http://localhost:3000
    CORE_TABLE: ${self:provider.environment.SERVICE_PREFIX}
    DOCS_BUCKET: ${self:provider.environment.SERVICE_PREFIX}-docs
    BOTS_BUCKET: ${self:provider.environment.SERVICE_PREFIX}-bots
    FILES_BUCKET: ${self:provider.environment.SERVICE_PREFIX}-files
    BOTS_PERMISSION: arn:aws:iam::${aws:accountId}:role/${self:provider.environment.SERVICE_PREFIX}
    # Auth0 Management API (M2M)
    AUTH0_DOMAIN: ${ssm:/baita/prod/auth0-domain}
    AUTH0_M2M_CLIENT_ID: ${ssm:/baita/prod/auth0-m2m-client-id}
    AUTH0_M2M_CLIENT_SECRET: ${ssm:/baita/prod/auth0-m2m-client-secret}
    # Partners (OAuth secrets resolved from SSM at deploy time)
    PIPEDRIVE_AUTH_URL: ${ssm:/baita/prod/pipedrive-auth-url}
    PIPEDRIVE_CLIENT_ID: ${ssm:/baita/prod/pipedrive-client-id}
    PIPEDRIVE_CLIENT_SECRET: ${ssm:/baita/prod/pipedrive-client-secret}
    GOOGLE_AUTH_URL: ${ssm:/baita/prod/google-auth-url}
    GOOGLE_CLIENT_ID: ${ssm:/baita/prod/google-client-id}
    GOOGLE_CLIENT_SECRET: ${ssm:/baita/prod/google-client-secret}
    NEWS_API_KEY: ${ssm:/baita/prod/news-api-key}
    VAPID_PUBLIC_KEY: ${ssm:/baita/prod/vapid-public-key}
    VAPID_PRIVATE_KEY: ${ssm:/baita/prod/vapid-private-key}
    AUTH0_CREATE_USER_API_KEY: ${ssm:/baita/prod/auth0-create-user-api-key}

functions:
  authorizer:
    handler: src/authorizer/index.handler
    timeout: 10

  # ─── User ──────────────────────────────────────────────────
  endpoint-user:
    handler: src/endpoints/user/index.handler
    events:
      # POST: Auth0 Post-Login Action only (API key auth, no CORS, excluded from OpenAPI docs)
      - http:
          path: user
          method: post
      # DELETE: Authenticated user account deletion (JWT auth, CORS, documented)
      - http:
          path: user
          method: delete
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}

  # ─── Bots ──────────────────────────────────────────────────
  endpoint-bots:
    handler: src/endpoints/bots/index.handler
    events:
      - http:
          path: bots
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: bots
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: bots/{botId}
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: bots/{botId}
          method: patch
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: bots/{botId}
          method: delete
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: bots/{botId}/deploy
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: bots/{botId}/test
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: bots/{botId}/logs
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}

  # ─── Bot Models (shared templates) ─────────────────────────
  endpoint-models:
    handler: src/endpoints/models/index.handler
    events:
      - http:
          path: models
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: models
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: models/{modelId}
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: models/{modelId}
          method: patch
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: models/{modelId}
          method: delete
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: models/{modelId}/deploy
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}

  # ─── Connections ───────────────────────────────────────────
  endpoint-connections:
    handler: src/endpoints/connections/index.handler
    events:
      - http:
          path: connections
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: connections
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: connections/{connectionId}
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: connections/{connectionId}
          method: delete
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: connections/{connectionId}/health
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}

  # ─── Content Feed ──────────────────────────────────────────
  endpoint-content:
    handler: src/endpoints/content/index.handler
    events:
      - http:
          path: content
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}

  # ─── Generic Data CRUD (dynamic resource types) ────────────
  endpoint-data:
    handler: src/endpoints/data/index.handler
    events:
      - http:
          path: data/{type}
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: data/{type}
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: data/{type}/{id}
          method: get
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: data/{type}/{id}
          method: patch
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: data/{type}/{id}
          method: delete
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: data/{type}/{id}/upload
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}
      - http:
          path: data/{type}/{id}/files/{fileId}
          method: delete
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}

  # ─── Tasks ─────────────────────────────────────────────────
  endpoint-tasks:
    handler: src/endpoints/tasks/index.handler
    events:
      - http:
          path: tasks/execute
          method: post
          cors: ${self:custom.cors}
          authorizer: ${self:custom.authorizer}

  # ─── OAuth Callback ────────────────────────────────────────
  oauth-callback:
    handler: src/endpoints/oauth/callback.handler
    events:
      - http:
          path: oauth/callback
          method: get

resources:
  Resources:
    # CORS headers on API Gateway error responses (4XX/5XX)
    GatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        RestApiId: !Ref ApiGatewayRestApi
        ResponseType: DEFAULT_4XX
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:provider.environment.SERVICE_SITE_URL}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,Accept'"
          gatewayresponse.header.Access-Control-Allow-Credentials: "'true'"
    GatewayResponseDefault5XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        RestApiId: !Ref ApiGatewayRestApi
        ResponseType: DEFAULT_5XX
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:provider.environment.SERVICE_SITE_URL}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,Accept'"
          gatewayresponse.header.Access-Control-Allow-Credentials: "'true'"

    # DynamoDB (single-table design)
    coreTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:provider.environment.CORE_TABLE}
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: sortKey
            KeyType: RANGE
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: sortKey
            AttributeType: S
        BillingMode: PAY_PER_REQUEST

    # S3 Buckets
    botsBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: Retain
      Properties:
        BucketName: ${self:provider.environment.BOTS_BUCKET}
    # Public GET gated by Referer header (bucket policy below).
    # ACL-based public access blocked; policy-based access allowed.
    filesBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: Retain
      Properties:
        BucketName: ${self:provider.environment.FILES_BUCKET}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          IgnorePublicAcls: true
          BlockPublicPolicy: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedMethods: [PUT]
              AllowedOrigins:
                - ${self:provider.environment.SERVICE_SITE_URL}
                - ${self:provider.environment.SERVICE_LOCAL_URL}
    filesBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref filesBucket
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: arn:aws:s3:::${self:provider.environment.FILES_BUCKET}/*
              Condition:
                StringLike:
                  aws:Referer:
                    - ${self:provider.environment.SERVICE_SITE_URL}/*
                    - ${self:provider.environment.SERVICE_LOCAL_URL}/*
    # Docs bucket: public read for hosting OpenAPI docs
    docsBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: Retain
      Properties:
        BucketName: ${self:provider.environment.DOCS_BUCKET}
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          IgnorePublicAcls: false
          BlockPublicPolicy: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET]
              AllowedOrigins:
                - ${self:provider.environment.SERVICE_API_URL}
    docsBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref docsBucket
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: arn:aws:s3:::${self:provider.environment.DOCS_BUCKET}/*

    # IAM role assumed by deployed bot Lambdas
    botsRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:provider.environment.SERVICE_PREFIX}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: sts:AssumeRole
              Principal:
                Service:
                  [
                    lambda.amazonaws.com,
                    scheduler.amazonaws.com,
                    apigateway.amazonaws.com,
                  ]
        Policies:
          - PolicyName: ${self:provider.environment.SERVICE_PREFIX}
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: [lambda:InvokeFunction]
                  Resource:
                    - arn:aws:lambda:us-east-1:*:function:${self:provider.environment.SERVICE_PREFIX}-*
                - Effect: Allow
                  Action:
                    [
                      logs:CreateLogStream,
                      logs:CreateLogGroup,
                      logs:PutLogEvents,
                    ]
                  Resource:
                    - arn:aws:logs:us-east-1:*:log-group:/aws/lambda/${self:provider.environment.SERVICE_PREFIX}-*:*

    # API Gateway docs route (serves OpenAPI spec at root /)
    docsRootMethod:
      Type: AWS::ApiGateway::Method
      Properties:
        RestApiId: !Ref ApiGatewayRestApi
        ResourceId: !GetAtt ApiGatewayRestApi.RootResourceId
        HttpMethod: GET
        AuthorizationType: NONE
        Integration:
          Type: HTTP
          IntegrationHttpMethod: GET
          Uri: http://${self:provider.environment.DOCS_BUCKET}.s3-website-us-east-1.amazonaws.com/index.html
          PassthroughBehavior: WHEN_NO_MATCH
          IntegrationResponses:
            - StatusCode: '200'
              ResponseParameters:
                method.response.header.Content-Type: "'text/html'"
        MethodResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: true
