AWSTemplateFormatVersion: '2010-09-09'
Description: Baita frontend — Amplify Hosting

Parameters:
  AppName:
    Type: String
    Default: baita-frontend
  DomainName:
    Type: String
    Default: baita.help

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Platform: WEB
      CustomRules:
        - Source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp|webmanifest)$)([^.]+$)/>'
          Target: /index.html
          Status: '200'

  MainBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: main
      EnableAutoBuild: false
      Stage: PRODUCTION

  CustomDomain:
    Type: AWS::Amplify::Domain
    DependsOn: MainBranch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      DomainName: !Ref DomainName
      SubDomainSettings:
        - BranchName: main
          Prefix: ''
        - BranchName: main
          Prefix: www

Outputs:
  AmplifyAppId:
    Value: !GetAtt AmplifyApp.AppId
  DefaultDomain:
    Value: !GetAtt AmplifyApp.DefaultDomain
